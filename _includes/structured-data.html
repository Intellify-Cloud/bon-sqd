<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "Organization",
      "@id": "{{ '/#organization' | absolute_url }}",
      "name": {{ site.data.business.name | jsonify }},
      "url": {{ '/' | absolute_url | jsonify }},
      "logo": {
        "@type": "ImageObject",
        "url": {{ site.data.business.logo | absolute_url | jsonify }}
      },
      "sameAs": {{ site.data.business.social_profiles | jsonify }}
    },
    {
      "@type": "WebSite",
      "@id": "{{ '/#website' | absolute_url }}",
      "url": {{ '/' | absolute_url | jsonify }},
      "name": {{ site.data.business.name | jsonify }},
      "description": {{ site.description | jsonify }},
      "publisher": {
        "@id": "{{ '/#organization' | absolute_url }}"
      }
    }
  ]
}
</script>
