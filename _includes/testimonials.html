<!-- Testimonials -->

   <section class="page-section" id="{{ site.data.sitetext.testimonials.section | default: 'testimonials' }}">
     <div class="container section-container">
       <div class="row">
         <div class="col-12 text-center">
           <h2 class="section-heading text-uppercase">{{ site.data.sitetext.testimonials.title }}</h2>
           <h3 class="section-subheading text-muted">What our clients say about working with Bond Squad.</h3>
         </div>
       </div>
       <div class="testimonials-container">
         {% for person in site.data.sitetext.testimonials.people %}
           <article class="testimonial-card">
             <div class="card-body">
               <blockquote>{{ person.testimony }}</blockquote>
               <p class="testimonial-author">{{ person.name }}</p>
             </div>
           </article>
         {% endfor %}
       </div>
     </div>
   </section>
<!-- End Testimonials -->
