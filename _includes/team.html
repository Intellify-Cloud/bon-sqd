<!-- Team -->
<section class="bg-light page-section " id="{{ site.data.sitetext.team.section | default: 'team' }}">
	<div class="container">
	  <div class="row">
		<div class="col-lg-12 text-center">
		  <h2 class="section-heading text-uppercase">{{ site.data.sitetext.team.title }}</h2>
		  <h3 class="section-subheading text-muted">{{ site.data.sitetext.team.text }}</h3>
		  <div class="team-container">
			{% for person in site.data.sitetext.team.people %}
			<div class="team-member">
			  <img src="{{ person.image | relative_url }}" alt="{{ person.name }}, {{ person.role }}" width="{{ person.width }}" height="{{ person.height }}" loading="lazy" decoding="async">
			  <h4>{{ person.name }}</h4>
			  <div class="card-body">
			  <p class="text-muted">{{ person.role }}</p>
			  <ul class="list-inline social-buttons">
				{% for network in person.social %}
				<li class="list-inline-item">
				  <a href="{{ network.url }}" aria-label="{{ network.label | default: network.icon | escape }}">
					<i class="{{ network.icon }}" aria-hidden="true"></i>
				  </a>
				</li>
				{% endfor %}
			  </ul>
			  </div>
			</div>
			{% endfor %}
		  </div>
		  
		  <div class="text-center">
			<div class="large text-muted">{{ site.data.sitetext.team.subtext | markdownify }}</div>
		  </div>
		</div>
	  </div>
	</div>
  </section>
  <!-- End Team -->
